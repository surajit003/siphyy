site_name: Siphyy
site_description: >-
  Open-source agentic framework for fleet telematics — provider-agnostic
  canonical schema, Tier 1 rule-based detectors, Tier 2 LLM-grounded agents.
site_author: Surajit Das
site_url: https://siphyy.surajit.dev/

repo_name: surajit003/siphyy
repo_url: https://github.com/surajit003/siphyy
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            docstring_section_style: spacy
            merge_init_into_class: true
            members_order: source
            heading_level: 2

nav:
  - Home: index.md
  - Tutorial:
      - tutorial/index.md
      - Install: tutorial/install.md
      - Your first pipeline: tutorial/first-pipeline.md
      - Writing an adapter: tutorial/writing-an-adapter.md
      - Writing a detector: tutorial/writing-a-detector.md
      - Using an LLM client: tutorial/using-an-llm-client.md
  - Concepts:
      - concepts/index.md
      - Architecture: concepts/architecture.md
      - Canonical schema: concepts/canonical-schema.md
      - Tier 1 vs Tier 2: concepts/tier-1-vs-tier-2.md
      - Case base: concepts/case-base.md
  - How-to:
      - how-to/index.md
      - Use Anthropic instead of OpenAI: how-to/use-anthropic.md
      - Add a new telematics provider: how-to/add-a-new-provider.md
      - Handle slope-effect false positives: how-to/handle-slope-effects.md
      - Deploy the demo: how-to/deploy-the-demo.md
  - Reference:
      - reference/index.md
      - Schema: reference/schema.md
      - Adapters: reference/adapters.md
      - Detectors: reference/detectors.md
      - Agents: reference/agents.md
  - About:
      - Changelog: about/changelog.md
      - Contributing: about/contributing.md
      - License: about/license.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/surajit003/siphyy
