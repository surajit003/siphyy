name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same PR / branch — save free minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Run ruff (lint)
        run: ruff check .
      - name: Run ruff (format check)
        run: ruff format --check .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system -e ".[dev,trakzee]"
      - name: Run mypy
        run: mypy src

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system -e ".[dev,trakzee]"
      - name: Run tests
        run: pytest -v
